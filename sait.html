<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Опрос: Влияние вредных привычек</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; }
        input[type="radio"], input[type="checkbox"] { margin-right: 10px; }
        button { padding: 10px 20px; background-color: #4CAF50; color: white; border: none; cursor: pointer; }
        button:hover { background-color: #45a049; }
        .result { margin-top: 20px; padding: 10px; background-color: #f0f0f0; display: none; }
    </style>
</head>
<body>

<h1>Опрос: Влияние вредных привычек на здоровье подростков</h1>
<form id="surveyForm">
    <div class="form-group">
        <label><strong>1. Сколько времени в день вы проводите за гаджетами?</strong></label>
        <label><input type="radio" name="q1" value="Менее 1 часа"> Менее 1 часа</label>
        <label><input type="radio" name="q1" value="1-3 часа"> 1-3 часа</label>
        <label><input type="radio" name="q1" value="Более 3 часов"> Более 3 часов</label>
    </div>

    <div class="form-group">
        <label><strong>2. Употребляете ли вы фастфуд регулярно (2 и более раз в неделю)?</strong></label>
        <label><input type="radio" name="q2" value="Да"> Да</label>
        <label><input type="radio" name="q2" value="Нет"> Нет</label>
    </div>

    <div class="form-group">
        <label><strong>3. Испытываете ли вы частую усталость или головную боль?</strong></label>
        <label><input type="radio" name="q3" value="Да"> Да</label>
        <label><input type="radio" name="q3" value="Нет"> Нет</label>
    </div>

    <div class="form-group">
        <label><strong>4. Есть ли у вас проблемы с осанкой или боли в спине?</strong></label>
        <label><input type="checkbox" name="q4" value="Боли в спине"> Боли в спине</label>
        <label><input type="checkbox" name="q4" value="Сутулость"> Сутулость</label>
        <label><input type="checkbox" name="q4" value="Нет"> Нет проблем</label>
    </div>

    <div class="form-group">
        <label><strong>5. Как часто вы занимаетесь физической активностью?</strong></label>
        <label><input type="radio" name="q5" value="Ежедневно"> Ежедневно</label>
        <label><input type="radio" name="q5" value="2-3 раза в неделю"> 2-3 раза в неделю</label>
        <label><input type="radio" name="q5" value="Редко илико или никогда</label>
    </div>

    <div class="form-group">
        <label><strong>6. Считаете ли вы, что вредные привычки влияют на выбор профессии?</strong></label>
        <label><input type="radio" name="q6" value="Да"> Да</label>
        <label><input type="radio" name="q6" value="Нет"> Нет</label>
    </div>

    <button type="submit">Отправить</button>
</form>

<div id="result" class="result">
    <h3>Спасибо за участие!</h3>
    <p>Ваши ответы:</p>
    <pre id="answers"></pre>
</div>

<script>
document.getElementById('surveyForm').addEventListener('submit', function(e) {
    e.preventDefault(); // Отменяем отправку формы

    let formData = new FormData(this);
    let answers = {};
    for (let [key, value] of formData.entries()) {
        if (answers[key]) {
            if (Array.isArray(answers[key])) {
                answers[key].push(value);
            } else {
                answers[key] = [answers[key], value];
            }
        } else {
            answers[key] = value;
        }
    }

    document.getElementById('answers').textContent = JSON.stringify(answers, null, 2);
    document.getElementById('result').style.display = 'block';
});
</script>

</body>
</html>
